version: 2
updates:
  # Keep the SHA-pinned GitHub Actions current (and patch action advisories).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  # Keep npm/pnpm dependencies current — including the exact-pinned next/react.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
