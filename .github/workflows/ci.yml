name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref (saves CI minutes).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: this workflow only needs to read the repository.
permissions:
  contents: read

jobs:
  ci:
    name: Format, lint, typecheck, build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # env:
    #   # Uncomment to enable Turborepo Remote Caching (Vercel):
    #   TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
    #   TURBO_TEAM: ${{ vars.TURBO_TEAM }}
    steps:
      - name: Checkout
        # Third-party actions are pinned to a full commit SHA (supply-chain
        # hardening); the trailing comment tracks the human-readable version,
        # and Dependabot (.github/dependabot.yml) keeps both current.
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # This job never pushes, so don't leave the token in .git/config.
          persist-credentials: false
          # fetch-depth: 2 lets Turborepo compare against the previous commit
          # (useful later for --filter=[HEAD^1] affected-package runs).
          fetch-depth: 2

      - name: Install pnpm
        # Reads the pinned pnpm version from the "packageManager" field.
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm exec prettier --check .

      - name: Lint, typecheck, build
        run: pnpm exec turbo run lint typecheck build

      - name: Security audit (production dependencies)
        # Report-only: surfaces known advisories without failing CI on transitive
        # vulnerabilities you cannot immediately fix. Review the run log.
        run: pnpm audit --prod
        continue-on-error: true
